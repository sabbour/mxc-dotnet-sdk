name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          # The test suite is Windows-bound: process-spawn fidelity tests launch cmd.exe and
          # pass C:\Windows\System32\cmd.exe as the executable (SpawnHelper.ResolveExecutable
          # requires the file to exist), so they cannot pass on Linux without a cross-platform
          # port. The released executor (wxc-exec.exe) is Windows-first. Run CI on Windows only
          # until the spawn tests are made cross-platform.
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore mxc-dotnet-sdk.slnx

      - name: Build
        run: dotnet build mxc-dotnet-sdk.slnx -c Release --no-restore

      - name: Test
        run: dotnet test mxc-dotnet-sdk.slnx -c Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/**/*.trx
          if-no-files-found: ignore
