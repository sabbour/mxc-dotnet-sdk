name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # required for NuGet.org Trusted Publishing (OIDC)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore mxc-dotnet-sdk.slnx

      - name: Pack
        run: dotnet pack src/Sabbour.Mxc.Sdk/Sabbour.Mxc.Sdk.csproj -c Release -o ./artifacts --no-restore

      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }} # your nuget.org username (profile name), NOT your email

      - name: Publish to NuGet.org
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
        # Uses Trusted Publishing: a Trusted Publishing policy must exist on nuget.org for this repo + workflow file.
        # NuGet.org pushes the matching .snupkg alongside the .nupkg when present.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.nupkg
            artifacts/*.snupkg
